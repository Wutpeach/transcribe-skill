name: transcribe-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  authority-and-regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lock authority and manual-review gate
        run: |
          pytest \
            tests/test_pipeline.py::test_run_minimal_pipeline_does_not_call_raw_text_rebuild_in_mainline \
            tests/test_pipeline.py::test_run_minimal_pipeline_locks_authority_flags_on_llm_primary_happy_path \
            tests/test_pipeline.py::test_run_minimal_pipeline_keeps_llm_authority_when_step2a_only_has_soft_alerts \
            tests/test_pipeline.py::test_run_minimal_pipeline_reports_manual_review_when_step2a_request_fails \
            tests/test_pipeline.py::test_run_minimal_pipeline_reports_manual_review_when_step3_llm_fails_without_rewriting_text \
            -q

      - name: Run full test suite
        run: |
          PYTHONPATH=scripts pytest -q
